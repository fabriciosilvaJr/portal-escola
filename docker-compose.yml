version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: portal_escolar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal_escolar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - portal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portal_escolar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  portal_network:
    driver: bridge